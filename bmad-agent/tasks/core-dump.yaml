# Core Dump Task

type: task
options:
  description: >
    Create a concise memory recording file (`.ai/core-dump-n.md`) to capture essential context of the current agent session.
  tool_connections:
    - connection_string: >-
        /subscriptions/<Azure Subscription ID>/resourceGroups/<Azure Resource Group name>/providers/Microsoft.MachineLearningServices/workspaces/<Azure AI Foundry Project name>/connections/<Tool connection name>
  parameters:
    session_context:
      description: >
        Includes conversation history, files created/modified/deleted, key decisions, project state, and next steps.
      type: object
  actions:
    - name: Check Existing Core Dump
      description: >
        Verify if `.ai/core-dump.md` exists and determine user preference for overwrite, update, append, or create new.
    - name: Analyze Session Context
      description: >
        Review conversation history, tasks completed, decisions made, and user preferences.
    - name: Document Accomplishments
      description: >
        Summarize primary actions, story progress, problem-solving, and user communications.
    - name: Record File Changes
      description: >
        List files created, modified, or deleted with concise details.
    - name: Capture Project State
      description: >
        Document current progress, blockers, and next logical steps.
    - name: Create/Update Core Dump File
      description: >
        Handle file creation or update based on user preference.
    - name: Optimize Context
      description: >
        Ensure concise and actionable information for future sessions.
    - name: Validate Completeness
      description: >
        Verify all session activities are captured and next steps are clear.